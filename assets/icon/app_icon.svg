<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="scanBeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#roundRect)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Vinyl Disc (back, left) - Purple -->
    <g transform="translate(280, 420) rotate(-15, 200, 200)">
      <circle cx="200" cy="200" r="200" fill="#7E57C2" opacity="0.85"/>
      <circle cx="200" cy="200" r="180" fill="none" stroke="#9575CD" stroke-width="2" opacity="0.5"/>
      <circle cx="200" cy="200" r="140" fill="none" stroke="#9575CD" stroke-width="1.5" opacity="0.4"/>
      <circle cx="200" cy="200" r="100" fill="none" stroke="#9575CD" stroke-width="1" opacity="0.3"/>
      <circle cx="200" cy="200" r="50" fill="#5E35B1"/>
      <circle cx="200" cy="200" r="18" fill="#1565C0"/>
    </g>

    <!-- Book (middle, angled) - Green -->
    <g transform="translate(340, 320) rotate(-5)">
      <!-- Book cover -->
      <rect x="0" y="0" width="280" height="380" rx="8" ry="8" fill="#43A047" opacity="0.9"/>
      <!-- Spine -->
      <rect x="0" y="0" width="32" height="380" rx="4" ry="4" fill="#2E7D32" opacity="0.9"/>
      <!-- Page edges -->
      <rect x="32" y="8" width="240" height="364" rx="2" ry="2" fill="#E8F5E9" opacity="0.3"/>
      <!-- Title line decorations -->
      <rect x="60" y="80" width="180" height="8" rx="4" fill="#FFFFFF" opacity="0.5"/>
      <rect x="80" y="105" width="140" height="6" rx="3" fill="#FFFFFF" opacity="0.35"/>
      <rect x="90" y="130" width="100" height="6" rx="3" fill="#FFFFFF" opacity="0.25"/>
    </g>

    <!-- Film Strip (front, right) - Red -->
    <g transform="translate(400, 280) rotate(8)">
      <!-- Film strip body -->
      <rect x="0" y="0" width="260" height="420" rx="6" fill="#E53935" opacity="0.9"/>
      <!-- Sprocket holes left -->
      <rect x="10" y="20" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="68" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="116" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="164" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="212" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="260" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="308" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="10" y="356" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <!-- Sprocket holes right -->
      <rect x="230" y="20" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="68" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="116" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="164" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="212" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="260" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="308" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <rect x="230" y="356" width="20" height="28" rx="4" fill="#0D47A1" opacity="0.6"/>
      <!-- Film frames -->
      <rect x="42" y="20" width="176" height="118" rx="4" fill="#FFCDD2" opacity="0.25"/>
      <rect x="42" y="152" width="176" height="118" rx="4" fill="#FFCDD2" opacity="0.25"/>
      <rect x="42" y="284" width="176" height="118" rx="4" fill="#FFCDD2" opacity="0.25"/>
    </g>

    <!-- Barcode Lines (white, overlaid across centre) -->
    <g opacity="0.92">
      <!-- Barcode lines of varying widths -->
      <rect x="280" y="380" width="5" height="260" fill="#FFFFFF"/>
      <rect x="290" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="298" y="380" width="7" height="260" fill="#FFFFFF"/>
      <rect x="312" y="380" width="4" height="260" fill="#FFFFFF"/>
      <rect x="320" y="380" width="2" height="260" fill="#FFFFFF"/>
      <rect x="327" y="380" width="6" height="260" fill="#FFFFFF"/>
      <rect x="338" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="346" y="380" width="8" height="260" fill="#FFFFFF"/>
      <rect x="360" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="368" y="380" width="5" height="260" fill="#FFFFFF"/>
      <rect x="380" y="380" width="2" height="260" fill="#FFFFFF"/>
      <rect x="387" y="380" width="6" height="260" fill="#FFFFFF"/>
      <rect x="400" y="380" width="4" height="260" fill="#FFFFFF"/>
      <!-- Centre guard bars -->
      <rect x="412" y="370" width="3" height="280" fill="#FFFFFF"/>
      <rect x="420" y="370" width="3" height="280" fill="#FFFFFF"/>
      <!-- Right half -->
      <rect x="432" y="380" width="5" height="260" fill="#FFFFFF"/>
      <rect x="442" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="450" y="380" width="7" height="260" fill="#FFFFFF"/>
      <rect x="463" y="380" width="4" height="260" fill="#FFFFFF"/>
      <rect x="472" y="380" width="2" height="260" fill="#FFFFFF"/>
      <rect x="479" y="380" width="6" height="260" fill="#FFFFFF"/>
      <rect x="490" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="498" y="380" width="8" height="260" fill="#FFFFFF"/>
      <rect x="512" y="380" width="3" height="260" fill="#FFFFFF"/>
      <rect x="520" y="380" width="5" height="260" fill="#FFFFFF"/>
      <rect x="530" y="380" width="2" height="260" fill="#FFFFFF"/>
      <rect x="537" y="380" width="6" height="260" fill="#FFFFFF"/>
      <rect x="548" y="380" width="4" height="260" fill="#FFFFFF"/>

      <!-- Extended guard bars (start/end) -->
      <rect x="272" y="370" width="3" height="280" fill="#FFFFFF"/>
      <rect x="553" y="370" width="3" height="280" fill="#FFFFFF"/>
    </g>

    <!-- Scan beam line -->
    <rect x="220" y="505" width="400" height="4" fill="url(#scanBeam)"/>
    <!-- Scan beam glow -->
    <rect x="220" y="502" width="400" height="10" rx="5" fill="url(#scanBeam)" opacity="0.4"/>
  </g>
</svg>
