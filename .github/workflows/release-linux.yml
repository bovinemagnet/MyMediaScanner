name: Release Linux AppImage

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_call:
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable

jobs:
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Cache build_runner output
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'lib/**/*.dart') }}
          restore-keys: build-runner-${{ runner.os }}-

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Build Linux release
        run: flutter build linux --release

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^\s*version:' pubspec.yaml | sed 's/.*version:[[:space:]]*//' | sed 's/+.*//' | tr -d ' ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Prepare AppDir
          APPDIR="MyMediaScanner.AppDir"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/metainfo"

          # Copy Flutter bundle
          cp -r build/linux/x64/release/bundle/* "${APPDIR}/"

          # Copy desktop file and icon
          cp linux/com.paulsnow.mymediascanner.desktop "${APPDIR}/usr/share/applications/"
          cp linux/com.paulsnow.mymediascanner.desktop "${APPDIR}/com.paulsnow.mymediascanner.desktop"
          cp assets/icon/app_icon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/com.paulsnow.mymediascanner.png"
          cp assets/icon/app_icon.png "${APPDIR}/com.paulsnow.mymediascanner.png"
          cp packaging/linux/com.paulsnow.mymediascanner.metainfo.xml "${APPDIR}/usr/share/metainfo/"

          # Create AppRun
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/mymediascanner" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Build AppImage
          APPIMAGE_NAME="MyMediaScanner-${APP_VERSION}-linux-x86_64.AppImage"
          ARCH=x86_64 ./appimagetool --no-appstream "${APPDIR}" "build/${APPIMAGE_NAME}"

          echo "appimage_name=${APPIMAGE_NAME}" >> "$GITHUB_ENV"
          echo "appimage_path=build/${APPIMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Upload AppImage artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.appimage_name }}
          path: ${{ env.appimage_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: ${{ env.appimage_path }}
          generate_release_notes: true
